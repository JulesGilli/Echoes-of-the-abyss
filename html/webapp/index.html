<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of the Abyss</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background-color: #1a1a2e;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            cursor: default;
            /* Stretch the canvas to fill the iframe / fullscreen viewport */
            width: 100% !important;
            height: 100% !important;
            object-fit: fill;
        }
        #loading {
            position: absolute;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.2em;
            text-align: center;
            z-index: 10;
        }
        #loading .bar {
            width: 300px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        #loading .bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            border-radius: 10px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="loading">
        <p>Loading Echoes of the Abyss...</p>
        <div class="bar"><div class="fill" id="progress"></div></div>
    </div>
    <script src="html/html.nocache.js"></script>
</body>
</html>
